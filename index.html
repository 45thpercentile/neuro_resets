<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Exercise Picker</title>
    <style>
      body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
      button { font-size: 1.2em; padding: 10px 20px; margin-top: 20px; }
      #result { margin-top: 30px; font-size: 1.5em; text-align: center; }
    </style>
  </head>
  <body>
    <h1>Random Reset Picker</h1>
    <button onclick="pickRandom()">Give Me One!</button>
    <div id="result">Click the button for a random reset.</div>

    <script>
const exercises = [
  "Colour scan - find 5 items of one colour",
  "Wall sit and breathe - 1 minute, shake out legs",
  "Lion's breath - Tongue out, eyes wide, forceful exhale",
  "Stair climb - 2 flights or 30 high knees",
  "Gentle brow massage - smooth from centre out 10 times",
  "Desk decompression - sit with fingers interlaced behind back, open chest",
  "Listen to visualization - Dolphins",
  "Visualize - Trekking in Chile",
  "Visualize - Dominican Republic",
  "Visualize - Brigs/Dunk's Bay",
  "Visualize - Phi Phi/Thailand",
  "Visualize - Rafting in Costa Rica",
  "Visualize - Egypt/Bedouin village",
  "Visualize - Spray Lakes",
  "Visualize - Ireland/Hiking in rain",
  "Visualize - Killarney as a kid",
  "Visualize - Killarney/Ontario 2007",
  "Visualize - Ned & Randy as Kittens",
  "Visualize - Ski racing",
  "Visualize - Waterskiing",
  "Visualize - Canoe Trips",
  "Visualize - Blue Chute",
  "Visualize - American River: C to G alone",
  "Visualize - American River: C to G with Kai", "Visualize - Everest base camp trek", "Visualize - Trek to Inca village in Peru", "Visualize - Sacred valley Peru", "Visualize - Blue cruise Turkey", "Visualize - Blue Hole Egypt", "Visualize - El Chaltain", "Visualize - El Calafate", "Visualize - Torres del Paines", "Visualize - George Lake", "Visualize - Killarney Lake", "Visualize - OSA Lake", "Visualize - Bay Fine", "Visualize - Lake Topaz", "Visualize - Brigs Night Watch", "Visualize - Generic Canoeing", "Visualize - Generic stand up paddle boarding", 
];

      function pickRandom() {
        const randomIndex = Math.floor(Math.random() * exercises.length);
        document.getElementById('result').textContent = exercises[randomIndex];
      }
    </script>
  </body>
</html>
